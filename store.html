<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ethnic Vogue | Handcrafted Luxury</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a1a1a; --accent: #d4af37; --bg: #ffffff; --white: #ffffff; --text: #333; --light-gray: #f9f9f9; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); -webkit-font-smoothing: antialiased; }
        
        /* Navigation */
        header { background: rgba(255,255,255,0.95); backdrop-filter: blur(5px); padding: 0.8rem 1rem; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .logo { height: 32px; filter: grayscale(1); }
        .cart-btn { background: none; border: none; font-size: 1.4rem; position: relative; cursor: pointer; color: var(--primary); padding: 5px; }
        .cart-count { position: absolute; top: 0; right: 0; background: var(--accent); color: white; font-size: 0.6rem; min-width: 15px; height: 15px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; }
        
        /* Hero Section */
        .hero { position: relative; height: 60vh; overflow: hidden; display: flex; align-items: center; justify-content: center; text-align: center; color: white; }
        .hero-bg { position: absolute; top:0; left:0; width:100%; height:100%; background: url('https://images.unsplash.com/photo-1610030469983-98e550d6193c?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat; transform: scale(1.1); filter: brightness(0.6); z-index: -1; }
        .hero-content { padding: 1.5rem; }
        .hero h1 { font-family: 'Playfair Display', serif; margin: 0; font-size: 2.2rem; font-weight: 700; letter-spacing: 1px; }
        .hero p { font-size: 0.9rem; margin-top: 0.5rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 300; }
        .btn-shop { background: var(--accent); color: white; border: none; padding: 0.8rem 2rem; border-radius: 0; margin-top: 1.5rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; cursor: pointer; }

        /* Filter Tabs */
        .categories { display: flex; overflow-x: auto; padding: 1.5rem 1rem; gap: 10px; scrollbar-width: none; background: #fff; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-tab { padding: 8px 18px; border: 1px solid #eee; border-radius: 20px; font-size: 0.75rem; font-weight: 600; white-space: nowrap; color: #666; transition: 0.3s; cursor: pointer; }
        .cat-tab.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Product Grid */
        .container { max-width: 1200px; margin: 0 auto; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 1rem 2rem 1rem; }
        
        @media (min-width: 768px) {
            .product-grid { grid-template-columns: repeat(3, 1fr); gap: 25px; }
            .hero { height: 70vh; }
            .hero h1 { font-size: 3.5rem; }
            .categories { justify-content: center; }
        }

        @media (min-width: 1024px) {
            .product-grid { grid-template-columns: repeat(4, 1fr); }
            header { padding: 1rem 5%; }
        }

        .product-card { background: var(--white); border-radius: 0; display: flex; flex-direction: column; position: relative; transition: transform 0.3s; }
        .product-img-wrap { width: 100%; aspect-ratio: 4/5; overflow: hidden; position: relative; }
        .product-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s; }
        .product-card:active .product-img { transform: scale(1.05); }
        .badge { position: absolute; top: 10px; left: 10px; background: var(--primary); color: white; padding: 2px 8px; font-size: 0.6rem; font-weight: 600; text-transform: uppercase; z-index: 10; }
        
        .product-info { padding: 12px 5px; text-align: left; }
        .product-name { font-weight: 400; font-size: 0.85rem; margin-bottom: 4px; color: #333; height: 1.3em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .product-price { color: var(--primary); font-weight: 600; font-size: 0.9rem; font-family: 'Playfair Display', serif; }
        .add-btn { position: absolute; bottom: 70px; right: 10px; width: 35px; height: 35px; background: white; color: var(--primary); border: none; border-radius: 50%; box-shadow: 0 3px 10px rgba(0,0,0,0.1); font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Cart Sidebar */
        .cart-overlay { position: fixed; top: 0; right: 0; bottom: 0; left: 0; background: rgba(0,0,0,0.6); display: none; z-index: 2000; opacity: 0; transition: 0.3s; }
        .cart-sidebar { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%; background: white; z-index: 2001; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); padding: 1.5rem; box-sizing: border-box; display: flex; flex-direction: column; }
        .cart-sidebar.open { transform: translateX(-100%); }
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; padding-bottom: 1rem; margin-bottom: 1rem; }
        .cart-header h3 { font-family: 'Playfair Display', serif; margin: 0; }
        .cart-items { flex-grow: 1; overflow-y: auto; }
        .cart-item { display: flex; gap: 15px; margin-bottom: 1.5rem; align-items: center; }
        .cart-item img { width: 70px; height: 90px; object-fit: cover; border-radius: 2px; }
        .cart-item-info { flex-grow: 1; }
        .cart-item-name { font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; }
        .cart-item-price { font-size: 0.8rem; color: #888; }
        .qty-ctrl { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
        .qty-btn { width: 24px; height: 24px; border: 1px solid #ddd; background: none; border-radius: 50%; font-size: 1rem; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .cart-footer { border-top: 1px solid #f0f0f0; padding-top: 1.5rem; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .total-row { display: flex; justify-content: space-between; font-weight: 600; font-size: 1.1rem; margin-top: 0.5rem; color: var(--primary); }
        .checkout-btn { background: var(--primary); color: white; border: none; padding: 1.2rem; width: 100%; font-weight: bold; font-size: 0.9rem; margin-top: 1.5rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }

        /* Checkout Modal */
        #checkout-container { position: fixed; top:0; left:0; width:100%; height:100%; background: white; z-index: 3000; display:none; flex-direction: column; overflow-y: auto; }
        .checkout-header { padding: 1rem; border-bottom: 1px solid #eee; display: flex; align-items: center; position: sticky; top:0; background: white; z-index: 10; }
        .form-section { padding: 1.5rem; }
        .form-section h4 { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1.2rem; }
        .input-group label { display: block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 5px; }
        .input-group input, .input-group textarea { width: 100%; padding: 12px 0; border: none; border-bottom: 1px solid #ddd; border-radius: 0; font-family: 'Poppins', sans-serif; font-size: 0.9rem; outline: none; transition: 0.3s; }
        .input-group input:focus { border-bottom-color: var(--accent); }
    </style>
</head>
<body>
    <header>
        <button style="background:none; border:none; font-size:1.2rem;">☰</button>
        <img src="assets/logo.png" alt="Ethnic Vogue" class="logo">
        <button class="cart-btn" id="open-cart">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
            <span class="cart-count" id="cart-count">0</span>
        </button>
    </header>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <p>Seasonal Collection</p>
            <h1>Artisan Crafts</h1>
            <button class="btn-shop" onclick="document.querySelector('.categories').scrollIntoView({behavior:'smooth'})">Explore Now</button>
        </div>
    </section>

    <main class="container">
        <div class="categories">
            <div class="cat-tab active" onclick="filterCat('All', this)">All Collections</div>
            <div class="cat-tab" onclick="filterCat('Sarees', this)">Sarees</div>
            <div class="cat-tab" onclick="filterCat('Suits', this)">Suits</div>
            <div class="cat-tab" onclick="filterCat('Jewelry', this)">Jewelry</div>
            <div class="cat-tab" onclick="filterCat('Menswear', this)">Menswear</div>
        </div>

        <div class="product-grid" id="product-grid">
            <!-- Products load here -->
        </div>
    </main>

    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3>Your Bag</h3>
            <button id="close-cart" style="background:none; border:none; font-size: 1.2rem;">✕</button>
        </div>
        <div class="cart-items" id="cart-items">
            <!-- Cart items load here -->
        </div>
        <div class="cart-footer">
            <div class="summary-row"><span>Subtotal</span><span id="subtotal">₹0.00</span></div>
            <div class="summary-row"><span>Shipping</span><span>Free</span></div>
            <div class="total-row"><span>Total</span><span id="cart-total">₹0.00</span></div>
            <button class="checkout-btn" id="go-to-checkout">Check Out</button>
        </div>
    </div>

    <div id="checkout-container">
        <div class="checkout-header">
            <button onclick="closeCheckout()" style="background:none; border:none; font-size:1.5rem; margin-right:1rem;">←</button>
            <h3 style="margin:0; font-family:'Playfair Display';">Checkout</h3>
        </div>
        <div class="form-section">
            <h4>Shipping Information</h4>
            <form id="checkout-form">
                <div class="input-group"><label>Full Name</label><input type="text" id="cust-name" required placeholder="John Doe"></div>
                <div class="input-group"><label>Mobile Number</label><input type="tel" id="cust-mobile" required placeholder="+91 ..."></div>
                <div class="input-group"><label>Delivery Address</label><textarea id="cust-address" rows="3" required placeholder="Apt, Street, City, ZIP"></textarea></div>
                
                <h4 style="margin-top:2.5rem;">Payment Method</h4>
                <div style="padding:1rem; border:1px solid var(--primary); display:flex; align-items:center; gap:10px;">
                    <input type="radio" checked>
                    <span style="font-size:0.9rem; font-weight:600;">Cash on Delivery (COD)</span>
                </div>
                
                <button type="submit" class="checkout-btn" style="margin-top:2.5rem;">Place My Order</button>
            </form>
        </div>
    </div>

    <script>
        let cart = [];
        let allProducts = [];
        let currentFilter = 'All';

        async function fetchProducts() {
            const res = await fetch('/api/products');
            allProducts = await res.json();
            renderProducts(allProducts);
        }

        function renderProducts(items) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = items.map(p => `
                <div class="product-card">
                    <div class="product-img-wrap">
                        ${p.stock_quantity < 5 ? '<span class="badge">Low Stock</span>' : ''}
                        <img src="${p.image_url || 'https://via.placeholder.com/300x400'}" class="product-img" loading="lazy">
                        <button class="add-btn" onclick="addToCart(${p.id})">+</button>
                    </div>
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">₹${parseFloat(p.price).toLocaleString('en-IN')}</div>
                    </div>
                </div>
            `).join('');
        }

        function filterCat(cat, el) {
            document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            currentFilter = cat;
            if(cat === 'All') {
                renderProducts(allProducts);
            } else {
                renderProducts(allProducts.filter(p => p.category === cat));
            }
        }

        function addToCart(productId) {
            const product = allProducts.find(p => p.id === productId);
            const inCart = cart.find(item => item.id === productId);
            if (inCart) {
                inCart.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCartUI();
            openCart();
        }

        function changeQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if(item) {
                item.quantity += delta;
                if(item.quantity <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
                updateCartUI();
            }
        }

        function updateCartUI() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').innerText = count;
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const totalStr = `₹${total.toLocaleString('en-IN')}`;
            document.getElementById('cart-total').innerText = totalStr;
            document.getElementById('subtotal').innerText = totalStr;

            const itemsContainer = document.getElementById('cart-items');
            if(cart.length === 0) {
                itemsContainer.innerHTML = '<div style="text-align:center; padding:3rem; color:#888;">Your bag is empty</div>';
            } else {
                itemsContainer.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <img src="${item.image_url || 'https://via.placeholder.com/70x90'}">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">₹${parseFloat(item.price).toLocaleString('en-IN')}</div>
                            <div class="qty-ctrl">
                                <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
                                <span style="font-size:0.85rem">${item.quantity}</span>
                                <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        const openCart = () => {
            document.getElementById('cart-sidebar').classList.add('open');
            const overlay = document.getElementById('cart-overlay');
            overlay.style.display = 'block';
            setTimeout(() => overlay.style.opacity = '1', 10);
        };
        const closeCart = () => {
            document.getElementById('cart-sidebar').classList.remove('open');
            const overlay = document.getElementById('cart-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 300);
        };

        document.getElementById('open-cart').onclick = openCart;
        document.getElementById('close-cart').onclick = closeCart;
        document.getElementById('cart-overlay').onclick = closeCart;
        
        document.getElementById('go-to-checkout').onclick = () => {
            if(cart.length === 0) return alert('Your bag is empty!');
            document.getElementById('checkout-container').style.display = 'flex';
        };

        function closeCheckout() {
            document.getElementById('checkout-container').style.display = 'none';
        }

        document.getElementById('checkout-form').onsubmit = async (e) => {
            e.preventDefault();
            const orderData = {
                customer_name: document.getElementById('cust-name').value,
                customer_mobile: document.getElementById('cust-mobile').value,
                address: document.getElementById('cust-address').value,
                total_amount: cart.reduce((sum, item) => sum + (item.price * item.quantity), 0),
                items: cart.map(item => ({ product_id: item.id, quantity: item.quantity, price: item.price }))
            };

            try {
                const res = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });

                if(res.ok) {
                    alert('Order Received! Thank you for shopping with us.');
                    cart = [];
                    updateCartUI();
                    closeCheckout();
                    closeCart();
                    fetchProducts(); // Refresh stock badges
                }
            } catch (err) {
                alert('Connection error. Please try again.');
            }
        };

        fetchProducts();
    </script>
</body>
</html>
