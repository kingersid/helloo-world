<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Admin | Ethnic Vogue</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a1a1a; --accent: #d4af37; --bg: #f5f5f7; --white: #ffffff; --text: #333; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; display: flex; color: var(--text); }
        
        /* Sidebar */
        .sidebar { width: 260px; height: 100vh; background: var(--primary); color: white; padding: 2rem 1.5rem; position: fixed; }
        .sidebar h2 { font-size: 1.2rem; margin-bottom: 3rem; letter-spacing: 1px; color: var(--accent); }
        .nav-item { padding: 12px 15px; margin-bottom: 5px; cursor: pointer; border-radius: 6px; transition: 0.3s; font-size: 0.9rem; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover { background: rgba(255,255,255,0.1); }
        .nav-item.active { background: var(--accent); color: white; }

        /* Main Content */
        .main { margin-left: 260px; flex-grow: 1; padding: 2.5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 2.5rem; }
        .stat-card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .stat-card small { color: #888; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card h3 { margin: 5px 0 0 0; font-size: 1.5rem; }

        .content-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        
        /* Table */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: #888; font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid #eee; }
        td { padding: 15px 12px; border-bottom: 1px solid #f9f9f9; font-size: 0.85rem; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .badge-pending { background: #fff3cd; color: #856404; }
        .badge-success { background: #d4edda; color: #155724; }

        /* Form */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: white; width: 500px; padding: 2.5rem; border-radius: 12px; position: relative; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 600; margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { opacity: 0.9; }

        @media (max-width: 768px) {
            body { flex-direction: column; padding: 1rem; }
            .sidebar { width: 100%; height: auto; position: relative; display: flex; overflow-x: auto; padding: 1rem; margin-bottom: 1rem; box-sizing: border-box; }
            .sidebar h2 { display: none; }
            .nav-item { margin-bottom: 0; white-space: nowrap; }
            .main { margin-left: 0; padding: 0; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .stat-card { padding: 1rem; }
            .stat-card h3 { font-size: 1.2rem; }
            .header { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .content-card { padding: 1rem; overflow-x: auto; }
            .modal-content { width: 90%; padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>EV ADMIN</h2>
        <div class="nav-item active" onclick="switchTab('orders')">📦 Orders</div>
        <div class="nav-item" onclick="switchTab('products')">🏷️ Products</div>
        <div class="nav-item">📊 Stats</div>
        <div class="nav-item">⚙️ Config</div>
    </div>

    <div class="main">
        <div class="header">
            <h1 id="view-title">Orders Dashboard</h1>
            <button class="btn-primary" id="action-btn" onclick="openProductModal()">+ Add Product</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><small>Total Orders</small><h3 id="stat-orders">0</h3></div>
            <div class="stat-card"><small>Total Revenue</small><h3 id="stat-revenue">₹0</h3></div>
            <div class="stat-card"><small>Pending</small><h3>5</h3></div>
            <div class="stat-card"><small>Avg. Order</small><h3>₹4,200</h3></div>
        </div>

        <div class="content-card">
            <div id="orders-view">
                <table>
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="orders-body"></tbody>
                </table>
            </div>

            <div id="products-view" style="display: none;">
                <table>
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="products-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add Product Modal -->
    <div class="modal" id="product-modal">
        <div class="modal-content">
            <h3 style="margin-top:0">Add New Collection Item</h3>
            <form id="product-form">
                <div class="form-group"><label>Product Name</label><input type="text" id="p-name" required></div>
                <div style="display:flex; gap:15px;">
                    <div class="form-group" style="flex:1"><label>Category</label>
                        <select id="p-cat">
                            <option>Sarees</option><option>Suits</option><option>Jewelry</option><option>Menswear</option><option>Casuals</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex:1"><label>Price (₹)</label><input type="number" id="p-price" required></div>
                </div>
                <div class="form-group"><label>Image URL</label><input type="text" id="p-image"></div>
                <div class="form-group"><label>Stock Quantity</label><input type="number" id="p-stock" value="10"></div>
                <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:1rem;">
                    <button type="button" onclick="closeProductModal()" style="background:none; border:none; cursor:pointer">Cancel</button>
                    <button type="submit" class="btn-primary">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        async function loadData() {
            // Orders
            const oRes = await fetch('/api/orders');
            const orders = await oRes.json();
            document.getElementById('stat-orders').innerText = orders.length;
            const revenue = orders.reduce((sum, o) => sum + parseFloat(o.total_amount), 0);
            document.getElementById('stat-revenue').innerText = `₹${revenue.toLocaleString('en-IN')}`;
            
            document.getElementById('orders-body').innerHTML = orders.map(o => `
                <tr>
                    <td>#${o.id}</td>
                    <td><strong>${o.customer_name}</strong><br><small>${o.customer_mobile}</small></td>
                    <td>${o.items ? o.items.map(i => `${i.quantity}x ${i.name}`).join(', ') : '...'}</td>
                    <td>₹${parseFloat(o.total_amount).toLocaleString('en-IN')}</td>
                    <td><span class="badge badge-pending">${o.status}</span></td>
                    <td>${new Date(o.created_at).toLocaleDateString()}</td>
                </tr>
            `).join('');

            // Products
            const pRes = await fetch('/api/products');
            const products = await pRes.json();
            document.getElementById('products-body').innerHTML = products.map(p => `
                <tr>
                    <td style="display:flex; align-items:center; gap:10px;">
                        <img src="${p.image_url}" style="width:40px; height:40px; border-radius:4px; object-fit:cover">
                        ${p.name}
                    </td>
                    <td>${p.category || 'N/A'}</td>
                    <td>₹${parseFloat(p.price).toLocaleString('en-IN')}</td>
                    <td>${p.stock_quantity} units</td>
                    <td><button style="background:none; border:none; color:blue; cursor:pointer">Edit</button></td>
                </tr>
            `).join('');
        }

        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.target.classList.add('active');
            
            if(tab === 'orders') {
                document.getElementById('orders-view').style.display = 'block';
                document.getElementById('products-view').style.display = 'none';
                document.getElementById('view-title').innerText = 'Orders Dashboard';
            } else {
                document.getElementById('orders-view').style.display = 'none';
                document.getElementById('products-view').style.display = 'block';
                document.getElementById('view-title').innerText = 'Product Inventory';
            }
        }

        function openProductModal() { document.getElementById('product-modal').style.display = 'flex'; }
        function closeProductModal() { document.getElementById('product-modal').style.display = 'none'; }

        document.getElementById('product-form').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('p-name').value,
                price: document.getElementById('p-price').value,
                image_url: document.getElementById('p-image').value,
                stock_quantity: document.getElementById('p-stock').value,
                category: document.getElementById('p-cat').value
            };

            const res = await fetch('/api/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if(res.ok) {
                closeProductModal();
                loadData();
                e.target.reset();
            }
        };

        loadData();
    </script>
</body>
</html>
