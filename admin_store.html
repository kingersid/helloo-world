<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethnic Vogue Admin | Product Management</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Dancing+Script:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --cream: #FAF7F2;
            --blush: #EDD9CB;
            --sand: #D9C9B8;
            --warm-taupe: #B8A99A;
            --muted-rose: #C9A99A;
            --sage: #B8C4B8;
            --gold: #C9A96E;
            --gold-light: #E2C98A;
            --charcoal: #2C2A28;
            --ink: #3E3A36;
            --text-mid: #7A6F65;
            --text-soft: #9E9188;

            --font-display: 'Cormorant Garamond', serif;
            --font-body: 'Merriweather', serif;
            --font-mono: 'DM Mono', monospace;
            --font-script: 'Dancing Script', cursive;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--cream);
            color: var(--charcoal);
            font-family: var(--font-body);
            font-size: 14px;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        header {
            background: var(--cream);
            border-bottom: 1px solid var(--sand);
            padding: 0 40px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .store-logo {
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 400;
            letter-spacing: 0.12em;
            color: var(--charcoal);
            text-transform: uppercase;
            text-decoration: none;
        }

        .store-logo span {
            font-family: var(--font-script);
            font-size: 14px;
            color: var(--gold);
            display: block;
            line-height: 1;
            letter-spacing: 0.04em;
            text-transform: none;
        }

        .nav-links a {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-mid);
            text-decoration: none;
            margin-left: 32px;
            transition: color 0.2s;
        }

        .nav-links a:hover { color: var(--gold); }

        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 40px;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 48px;
        }

        .admin-section-title {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 0.05em;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--sand);
            padding-bottom: 16px;
        }

        /* Form Styling */
        .form-container {
            background: white;
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(44, 42, 40, 0.05);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }

        .input-group label {
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--text-mid);
        }

        .input-group input,
        .input-group select,
        .input-group textarea {
            border: 1px solid var(--sand);
            background: var(--cream);
            padding: 12px 16px;
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 300;
            color: var(--charcoal);
            outline: none;
            border-radius: 2px;
            transition: border-color 0.2s, background 0.2s;
            width: 100%;
        }

        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            border-color: var(--gold);
            background: white;
        }

        .btn-primary {
            background: var(--charcoal);
            color: var(--cream);
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 14px 28px;
            border: none;
            cursor: pointer;
            transition: background 0.25s, transform 0.2s;
            border-radius: 2px;
            width: 100%;
        }

        .btn-primary:hover {
            background: var(--gold);
            transform: translateY(-1px);
        }

        /* Table Styling */
        .product-list-container {
            background: white;
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(44, 42, 40, 0.05);
            overflow-x: auto;
        }

        .product-table {
            width: 100%;
            border-collapse: collapse;
        }

        .product-table th {
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-soft);
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--sand);
        }

        .product-table td {
            font-family: var(--font-body);
            font-size: 13px;
            color: var(--ink);
            padding: 16px;
            border-bottom: 1px solid #f0ece6;
        }

        .product-table tr:hover td {
            background-color: var(--cream);
        }

        .price-cell { font-family: var(--font-mono); font-weight: 600; }
        .category-badge {
            display: inline-block;
            padding: 4px 8px;
            background: var(--blush);
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.1em;
            border-radius: 2px;
            text-transform: uppercase;
        }

        .product-thumbnail {
            width: 40px;
            height: 50px;
            object-fit: cover;
            border-radius: 2px;
            background: var(--sand);
        }

        @media (max-width: 1024px) {
            main { grid-template-columns: 1fr; }
        }

        .toast {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: var(--charcoal);
            color: var(--cream);
            padding: 16px 24px;
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            border-radius: 2px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            display: none;
            z-index: 2000;
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="store-logo">Ethnic Vogue <span>Admin Panel</span></a>
        <nav class="nav-links">
            <a href="/store">View Store</a>
            <a href="/admin-store">Products</a>
            <a href="/api/orders">Orders</a>
        </nav>
    </header>

    <main>
        <section>
            <h2 class="admin-section-title">Add New Product</h2>
            <div class="form-container">
                <form id="product-form">
                    <div class="input-group">
                        <label>Product Name</label>
                        <input type="text" id="name" required placeholder="e.g. Pure Mul Cotton Saree">
                    </div>
                    <div class="input-group">
                        <label>Category</label>
                        <select id="category" required>
                            <option value="Sarees">Sarees</option>
                            <option value="Suits">Suits</option>
                            <option value="Lehengas">Lehengas</option>
                            <option value="Kurtas">Kurtas</option>
                            <option value="Cord-sets">Cord-sets</option>
                            <option value="Jewelry">Jewelry</option>
                            <option value="Accessories">Accessories</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Price (INR)</label>
                        <input type="number" id="price" required placeholder="0.00">
                    </div>
                    <div class="input-group">
                        <label>Stock Quantity</label>
                        <input type="number" id="stock" required placeholder="0">
                    </div>
                    <div class="input-group">
                        <label>Image URL</label>
                        <input type="url" id="image_url" placeholder="https://...">
                    </div>
                    <div class="input-group">
                        <label>Fabric</label>
                        <input type="text" id="fabric" placeholder="e.g. Pure Mul Cotton">
                    </div>
                    <div class="input-group">
                        <label>Size Options (comma separated)</label>
                        <input type="text" id="size_options" placeholder="M,L,XL,UNSTITCHED">
                    </div>
                    <div class="input-group">
                        <label>Garment Details</label>
                        <textarea id="garment_details" rows="2" placeholder="e.g. Relaxed fit, 44 inches length..."></textarea>
                    </div>
                    <div class="input-group">
                        <label>Care Instructions</label>
                        <textarea id="care_instructions" rows="2" placeholder="e.g. Dry clean only..."></textarea>
                    </div>
                    <div class="input-group">
                        <label>Description</label>
                        <textarea id="description" rows="3" placeholder="Crafted with grace..."></textarea>
                    </div>
                    <button type="submit" class="btn-primary">Add Product</button>
                </form>
            </div>
        </section>

        <section>
            <h2 class="admin-section-title">Current Inventory</h2>
            <div class="product-list-container">
                <table class="product-table">
                    <thead>
                        <tr>
                            <th>Img</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                        </tr>
                    </thead>
                    <tbody id="product-list-body">
                        <!-- Products will be loaded here -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="toast" class="toast">Product added successfully</div>

    <script>
        const productForm = document.getElementById('product-form');
        const productListBody = document.getElementById('product-list-body');
        const toast = document.getElementById('toast');

        async function fetchProducts() {
            try {
                const res = await fetch('/api/products');
                const products = await res.json();
                renderProducts(products);
            } catch (err) {
                console.error("Error fetching products:", err);
            }
        }

        function renderProducts(products) {
            productListBody.innerHTML = products.map(p => `
                <tr>
                    <td><img src="${p.image_url || 'https://via.placeholder.com/40x50'}" class="product-thumbnail"></td>
                    <td>${p.name}</td>
                    <td><span class="category-badge">${p.category}</span></td>
                    <td class="price-cell">₹${parseFloat(p.price).toLocaleString('en-IN')}</td>
                    <td>${p.stock_quantity}</td>
                </tr>
            `).join('');
        }

        productForm.onsubmit = async (e) => {
            e.preventDefault();
            const productData = {
                name: document.getElementById('name').value,
                category: document.getElementById('category').value,
                price: parseFloat(document.getElementById('price').value),
                stock_quantity: parseInt(document.getElementById('stock').value),
                image_url: document.getElementById('image_url').value,
                fabric: document.getElementById('fabric').value,
                size_options: document.getElementById('size_options').value,
                garment_details: document.getElementById('garment_details').value,
                care_instructions: document.getElementById('care_instructions').value,
                description: document.getElementById('description').value
            };

            try {
                const res = await fetch('/api/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(productData)
                });

                if (res.ok) {
                    showToast('Product added successfully');
                    productForm.reset();
                    fetchProducts();
                } else {
                    showToast('Error adding product');
                }
            } catch (err) {
                showToast('Connection error');
            }
        };

        function showToast(message) {
            toast.innerText = message;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        fetchProducts();
    </script>
</body>
</html>
